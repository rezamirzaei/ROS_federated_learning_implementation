name: Bug report
description: Something is wrong — reproducible, ideally with a failing test.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. The more reproducible the report, the
        faster it gets fixed.

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse HEAD` or the tag you're on.
      placeholder: e.g. v1.0.0 or abcd1234
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Run mode
      options:
        - Standalone (main.py)
        - Docker dashboard (run.sh)
        - Full ROS2 stack (run.sh ros)
        - Benchmark script
        - Test suite
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact commands, config, and seeds.
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack traces
      render: text

