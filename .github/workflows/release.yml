name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (without leading v)"
        required: true

permissions:
  contents: write       # Needed to attach artifacts to the GitHub Release.
  id-token: write       # OIDC for Trusted Publishing to PyPI.
  packages: write       # Push container images to GHCR.
  attestations: write   # Provenance attestations.

jobs:
  build-python:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - name: Build distributions
        run: |
          uv run --with build python -m build
      - name: Generate SBOM (Python package)
        uses: anchore/sbom-action@v0
        with:
          path: dist
          format: spdx-json
          artifact-name: fl-robots-python-sbom.spdx.json
      - name: Attest provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI (Trusted Publishing)
    needs: build-python
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fl-robots
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        # Requires the PyPI project to have Trusted Publishing configured
        # to this repo + workflow + environment. Falls back to no-op if the
        # environment isn't wired yet.
        with:
          skip-existing: true

  docker-images:
    name: Build & push multi-arch images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: standalone-runtime
            name: fl-robots-standalone
          - target: ros-runtime
            name: fl-robots-ros
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ steps.ver.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
      - name: Attest image provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  github-release:
    name: Attach artifacts to GitHub Release
    needs: [build-python, docker-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          generate_release_notes: true

