x-ros-common: &ros-common
  image: fl-robots-ros:latest
  build:
    context: .
    dockerfile: docker/Dockerfile
    target: ros-runtime
  environment:
    - ROS_DOMAIN_ID=42
  networks:
    - ros_network
  profiles:
    - ros
  restart: unless-stopped
  volumes:
    - ./logs:/ros2_ws/logs

services:
  dashboard:
    image: fl-robots-standalone:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: standalone-runtime
    container_name: fl_dashboard
    hostname: dashboard
    command: ["python", "main.py", "run", "--host", "0.0.0.0", "--port", "5000"]
    # Host port 5000 is taken by macOS Control Center / AirPlay Receiver,
    # so we expose the container on 5050 externally. Override with
    # `FL_ROBOTS_HOST_PORT=xxxx docker compose up` if 5050 is also busy.
    ports:
      - "${FL_ROBOTS_HOST_PORT:-5050}:5000"
    restart: unless-stopped
    stop_grace_period: 10s
    healthcheck:
      # Prefer /api/ready so that Kubernetes/Compose only routes traffic to
      # the container once the simulation thread is stepping. Liveness
      # stays on /api/health so a stalled sim doesn't get CrashLooped.
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:5000/api/ready', timeout=2).status == 200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  test_runner:
    image: fl-robots-test:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: standalone-test
    profiles:
      - tools
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]

  aggregator:
    <<: *ros-common
    container_name: fl_aggregator
    hostname: aggregator
    command: >
      bash -c "source /ros2_ws/install/setup.bash &&
               ros2 run fl_robots aggregator"
    volumes:
      - ./logs:/ros2_ws/logs
      - ./models:/ros2_ws/models
    healthcheck:
      test: ["CMD", "bash", "-c", "source /ros2_ws/install/setup.bash && ros2 node list | grep -q aggregator"]
      interval: 15s
      timeout: 5s
      retries: 3

  robot_1:
    <<: *ros-common
    container_name: fl_robot_1
    hostname: robot_1
    depends_on:
      aggregator:
        condition: service_healthy
    command: >
      bash -c "sleep 3 && source /ros2_ws/install/setup.bash &&
               ros2 run fl_robots robot_agent --ros-args -p robot_id:=robot_1"

  robot_2:
    <<: *ros-common
    container_name: fl_robot_2
    hostname: robot_2
    depends_on:
      aggregator:
        condition: service_healthy
    command: >
      bash -c "sleep 3 && source /ros2_ws/install/setup.bash &&
               ros2 run fl_robots robot_agent --ros-args -p robot_id:=robot_2"

  robot_3:
    <<: *ros-common
    container_name: fl_robot_3
    hostname: robot_3
    depends_on:
      aggregator:
        condition: service_healthy
    command: >
      bash -c "sleep 3 && source /ros2_ws/install/setup.bash &&
               ros2 run fl_robots robot_agent --ros-args -p robot_id:=robot_3"

  coordinator:
    <<: *ros-common
    container_name: fl_coordinator
    hostname: coordinator
    depends_on:
      aggregator:
        condition: service_healthy
    command: >
      bash -c "sleep 8 && source /ros2_ws/install/setup.bash &&
               ros2 run fl_robots coordinator"
    volumes:
      - ./logs:/ros2_ws/logs
      - ./models:/ros2_ws/models

  monitor:
    <<: *ros-common
    container_name: fl_monitor
    hostname: monitor
    depends_on:
      - coordinator
    command: >
      bash -c "sleep 10 && source /ros2_ws/install/setup.bash &&
               ros2 run fl_robots monitor"
    volumes:
      - ./logs:/ros2_ws/logs
      - ./results:/ros2_ws/results

  digital_twin:
    <<: *ros-common
    container_name: fl_digital_twin
    hostname: digital_twin
    depends_on:
      - monitor
    command: >
      bash -c "sleep 12 && source /ros2_ws/install/setup.bash &&
               ros2 run fl_robots digital_twin"
    volumes:
      - ./logs:/ros2_ws/logs
      - ./results:/ros2_ws/results

  web_dashboard:
    <<: *ros-common
    container_name: fl_web_dashboard
    hostname: web_dashboard
    ports:
      - "${FL_ROBOTS_ROS_DASHBOARD_PORT:-5001}:5000"
    depends_on:
      - digital_twin
    command: >
      bash -c "sleep 15 && source /ros2_ws/install/setup.bash &&
               ros2 run fl_robots web_dashboard"
    volumes:
      - ./logs:/ros2_ws/logs
      - ./results:/ros2_ws/results
    healthcheck:
      test: ["CMD", "python3", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:5000/api/status').read()"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  ros_network:
    driver: bridge
