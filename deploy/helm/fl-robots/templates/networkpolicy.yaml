{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fl-robots.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "fl-robots.name" . }}
  policyTypes: [Ingress, Egress]
  ingress:
    - ports:
        - port: {{ .Values.service.targetPort }}
          protocol: TCP
  egress:
    - {}  # allow all egress by default; tighten per environment
{{- end }}
