apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fl-robots
  namespace: fl-robots
  labels:
    app.kubernetes.io/name: fl-robots
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: fl-robots
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 5000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

