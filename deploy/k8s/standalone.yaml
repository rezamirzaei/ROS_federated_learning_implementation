# fl-robots standalone dashboard — Kubernetes deployment manifests.
#
# Apply with:
#   kubectl apply -f deploy/k8s/
#
# Requires a built & pushed image; the default tag here targets the image
# produced by the `docker-standalone` CI job. Override with:
#   kubectl set image deployment/fl-robots fl-robots=ghcr.io/<org>/fl-robots:<tag>
---
apiVersion: v1
kind: Namespace
metadata:
  name: fl-robots
  labels:
    app.kubernetes.io/name: fl-robots
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fl-robots-config
  namespace: fl-robots
data:
  FL_ROBOTS_RATE_WINDOW_S: "10"
  FL_ROBOTS_RATE_MAX_HITS: "30"
  FL_ROBOTS_READY_STALE_S: "5"
  # Override the default CSP if your org wants to self-host third-party assets
  # such as Chart.js instead of allowing jsdelivr in `script-src`.
  # FL_ROBOTS_CSP: "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-robots
  namespace: fl-robots
  labels:
    app.kubernetes.io/name: fl-robots
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fl-robots
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fl-robots
        app.kubernetes.io/component: dashboard
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fl-robots
          image: ghcr.io/rezami/fl-robots-standalone:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fl-robots-config
          # SLO-1 readiness: flip to NotReady whenever /api/ready 503s.
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 2
          # Liveness uses the cheap health probe to avoid false-positive
          # restart loops while the sim is warming up.
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: results
              mountPath: /app/results
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: results
          emptyDir:
            sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fl-robots
  namespace: fl-robots
  labels:
    app.kubernetes.io/name: fl-robots
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fl-robots
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
# ServiceMonitor — requires the Prometheus Operator. Safe to leave applied
# even without the CRD installed (kubectl will just report it unknown).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fl-robots
  namespace: fl-robots
  labels:
    app.kubernetes.io/name: fl-robots
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fl-robots
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - fl-robots
---
# Prometheus alert rules, sourced from docs/prometheus-rules.yml so they
# live next to the app. Edit docs/prometheus-rules.yml first and mirror here.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: fl-robots
  namespace: fl-robots
  labels:
    app.kubernetes.io/name: fl-robots
    release: prometheus
spec:
  groups:
    - name: fl-robots.slo
      interval: 30s
      rules:
        - alert: FLRobotsReadinessDown
          expr: up{job="fl-robots"} == 0
          for: 2m
          labels:
            severity: page
            service: fl-robots
          annotations:
            summary: "fl-robots readiness probe has been down for 2m"
            description: "The `/api/ready` endpoint has reported failure for 2 minutes. SLO-1 budget at risk."
        - alert: FLRobotsTrainingStalled
          expr: |
            (fl_training_active == 1)
            and on() (increase(fl_aggregation_rounds_total[5m]) == 0)
          for: 5m
          labels:
            severity: warning
            service: fl-robots
          annotations:
            summary: "Training is active but no rounds completed in 5m"
            description: "The coordinator reports `training_active=1` but `rounds_completed_total` has not advanced. Aggregator may be blocked."
        - alert: FLRobotsAggregationDivergenceHigh
          expr: fl_aggregation_divergence > 0.5
          for: 3m
          labels:
            severity: warning
            service: fl-robots
          annotations:
            summary: "Gradient divergence above 0.5 for 3m"
            description: "Clients are disagreeing strongly. Consider lowering the learning rate or switching to FedProx."
        - alert: FLRobotsTrackingErrorSpike
          expr: |
            histogram_quantile(0.95, sum(rate(fl_tracking_error_bucket[5m])) by (le)) > 1.5
          for: 5m
          labels:
            severity: warning
            service: fl-robots
          annotations:
            summary: "MPC tracking error p95 > 1.5 m for 5m"
            description: "Formation is not holding. Disturbance may be unrecovered; controller stuck in RECOVERING?"
        - alert: FLRobotsControllerError
          expr: fl_controller_state{state="ERROR"} == 1
          for: 1m
          labels:
            severity: page
            service: fl-robots
          annotations:
            summary: "Controller stuck in ERROR state"
            description: "The simulation controller has been in ERROR for 1m. Manual reset required."
        - alert: FLRobotsQpSolveSlow
          expr: |
            histogram_quantile(0.99, sum(rate(fl_mpc_solve_time_ms_bucket[5m])) by (le)) > 25
          for: 10m
          labels:
            severity: warning
            service: fl-robots
          annotations:
            summary: "MPC solve p99 > 25 ms for 10m"
            description: "SLO-3 budget burning; check OSQP iteration count and neighbour keep-out constraint density."
        - alert: FLRobotsBudgetBurn
          expr: |
            (
              1 - avg_over_time(up{job="fl-robots"}[1h])
            ) > 0.001
          for: 15m
          labels:
            severity: page
            service: fl-robots
          annotations:
            summary: "Readiness burn rate > 10× (30d budget)"
            description: "Burning error budget >10× the 30d pace. SLO-1 at risk."
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fl-robots
  namespace: fl-robots
spec:
  minAvailable: 0  # Single-replica demo — keep the budget permissive.
  selector:
    matchLabels:
      app.kubernetes.io/name: fl-robots
