x-common: &common
  image: fl-robots:latest
  build:
    context: ..
    dockerfile: docker/Dockerfile
  environment:
    - ROS_DOMAIN_ID=42
  networks:
    - ros_network
  restart: unless-stopped
  volumes:
    - ../logs:/ros2_ws/logs

services:
  # Federated Learning Aggregator Node (Lifecycle + Services)
  aggregator:
    <<: *common
    container_name: fl_aggregator
    hostname: aggregator
    command: >
      bash -c "source /ros2_ws/install/setup.bash && 
               ros2 run fl_robots aggregator"
    volumes:
      - ../logs:/ros2_ws/logs
      - ../models:/ros2_ws/models
    healthcheck:
      test: ["CMD", "bash", "-c", "source /ros2_ws/install/setup.bash && ros2 node list | grep -q aggregator"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Robot Agent 1
  robot_1:
    <<: *common
    container_name: fl_robot_1
    hostname: robot_1
    depends_on:
      aggregator:
        condition: service_healthy
    command: >
      bash -c "sleep 3 && source /ros2_ws/install/setup.bash && 
               ros2 run fl_robots robot_agent --ros-args -p robot_id:=robot_1"

  # Robot Agent 2
  robot_2:
    <<: *common
    container_name: fl_robot_2
    hostname: robot_2
    depends_on:
      aggregator:
        condition: service_healthy
    command: >
      bash -c "sleep 3 && source /ros2_ws/install/setup.bash && 
               ros2 run fl_robots robot_agent --ros-args -p robot_id:=robot_2"

  # Robot Agent 3
  robot_3:
    <<: *common
    container_name: fl_robot_3
    hostname: robot_3
    depends_on:
      aggregator:
        condition: service_healthy
    command: >
      bash -c "sleep 3 && source /ros2_ws/install/setup.bash && 
               ros2 run fl_robots robot_agent --ros-args -p robot_id:=robot_3"

  # Coordinator Node (State Machine Orchestrator)
  coordinator:
    <<: *common
    container_name: fl_coordinator
    hostname: coordinator
    depends_on:
      aggregator:
        condition: service_healthy
    command: >
      bash -c "sleep 8 && source /ros2_ws/install/setup.bash && 
               ros2 run fl_robots coordinator"
    volumes:
      - ../logs:/ros2_ws/logs
      - ../models:/ros2_ws/models

  # Monitor Node (Metrics Persistence)
  monitor:
    <<: *common
    container_name: fl_monitor
    hostname: monitor
    depends_on:
      - coordinator
    command: >
      bash -c "sleep 10 && source /ros2_ws/install/setup.bash && 
               ros2 run fl_robots monitor"
    volumes:
      - ../logs:/ros2_ws/logs
      - ../results:/ros2_ws/results

  # Digital Twin Visualization Node
  digital_twin:
    <<: *common
    container_name: fl_digital_twin
    hostname: digital_twin
    depends_on:
      - monitor
    command: >
      bash -c "sleep 12 && source /ros2_ws/install/setup.bash && 
               ros2 run fl_robots digital_twin"
    volumes:
      - ../logs:/ros2_ws/logs
      - ../results:/ros2_ws/results

  # Web Dashboard Node (MVC + WebSocket)
  web_dashboard:
    <<: *common
    container_name: fl_web_dashboard
    hostname: web_dashboard
    ports:
      - "5000:5000"
    depends_on:
      - digital_twin
    command: >
      bash -c "sleep 15 && source /ros2_ws/install/setup.bash && 
               ros2 run fl_robots web_dashboard"
    volumes:
      - ../logs:/ros2_ws/logs
      - ../results:/ros2_ws/results
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  ros_network:
    driver: bridge
