site_name: fl-robots
site_description: "ROS2 Federated Learning Multi-Robot Coordination System"
site_url: https://rezami.github.io/ros-federated-learning
repo_url: https://github.com/rezami/ros-federated-learning
repo_name: rezami/ros-federated-learning
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src/fl_robots]
          options:
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            members_order: source
            docstring_style: google
            show_if_no_docstring: false
            filters:
              - "!^_"         # hide private
              - "^__init__$"  # but keep constructors

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Architecture: ARCHITECTURE.md
  - Benchmarks: BENCHMARKS.md
  - Development: DEVELOPMENT.md
  - SLO: SLO.md
  - Security: SECURITY.md
  - API Reference:
      - Standalone web: api/standalone_web.md
      - Simulation: api/simulation.md
      - MPC QP planner: api/mpc_qp.md
      - Aggregator: api/aggregator.md
      - Robot agent: api/robot_agent.md
      - Observability: api/observability.md

