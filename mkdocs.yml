site_name: fl-robots
site_description: "ROS2 Federated Learning Multi-Robot Coordination System"
site_url: https://rezami.github.io/ros-federated-learning
repo_url: https://github.com/rezami/ros-federated-learning
repo_name: rezami/ros-federated-learning
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src/fl_robots]
          options:
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            members_order: source
            docstring_style: google
            show_if_no_docstring: false
            filters:
              - "!^_"         # hide private
              - "^__init__$"  # but keep constructors

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Architecture: ARCHITECTURE.md
  - ADRs:
      - ADR 0001 · Dual-mode ROS shim: adr/0001-dual-mode-ros-shim.md
      - ADR 0002 · JSON string fallback protocol: adr/0002-json-string-fallback-protocol.md
      - ADR 0003 · Planner pluggability: adr/0003-planner-pluggability.md
      - ADR 0004 · Lifecycle vs plain node: adr/0004-lifecycle-vs-node.md
      - ADR 0005 · Standalone CSRF strategy: adr/0005-standalone-csrf-strategy.md
      - ADR 0006 · Solver caching warm-start: adr/0006-solver-caching-warm-start.md
      - ADR 0007 · WSGI Gunicorn serving: adr/0007-wsgi-gunicorn-serving.md
  - Benchmarks: BENCHMARKS.md
  - Development: DEVELOPMENT.md
  - Observability: OBSERVABILITY.md
  - Runbook: RUNBOOK.md
  - SLO: SLO.md
  - Security: SECURITY.md
  - API Reference:
      - Standalone web: api/standalone_web.md
      - Simulation: api/simulation.md
      - MPC QP planner: api/mpc_qp.md
      - Aggregator: api/aggregator.md
      - Robot agent: api/robot_agent.md
      - Observability: api/observability.md
